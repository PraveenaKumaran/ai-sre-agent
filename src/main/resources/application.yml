server:
  port: 8080

spring:
  application:
    name: ai-sre-agent

# ---------------------------------------------------------------------------
# Foundry / Foundry IQ configuration.
#
# DEFAULTS ARE OFF. With foundry.enabled=false the app runs the Phase-1 stub
# (canned data, no network), so the baseline always works without credentials.
#
# IMPORTANT: the path templates, api-version values, auth header/scheme, and the
# Foundry IQ request/response shapes change over time and differ per resource.
# Do NOT trust the placeholders. Confirm the current shapes on Microsoft Learn:
#   - Foundry SDKs/endpoints: search "Get started with Microsoft Foundry SDKs and Endpoints"
#   - Foundry IQ: https://learn.microsoft.com/azure/foundry/agents/concepts/what-is-foundry-iq
#
# Secrets come from environment variables ONLY and are never committed:
#   (PowerShell)  $env:FOUNDRY_API_KEY = "your-model-key"
#                 $env:FOUNDRY_IQ_API_KEY = "your-iq-key"   # only if IQ uses a separate key
# ---------------------------------------------------------------------------
foundry:
  enabled: true                          # live: drives the real model-based loop
  # OpenAI v1 endpoint (api-key auth works here; no Entra/Azure CLI needed).
  # If this host does not resolve, switch to the .services.ai.azure.com form:
  #   https://ai-sre-resource-praveen.services.ai.azure.com
  endpoint: "https://ai-sre-resource-praveen.openai.azure.com"
  model: "gpt-5-mini"                     # selected in the request BODY on the v1 endpoint
  api-key: ${FOUNDRY_API_KEY:}           # from env var only; blank if unset (NEVER committed)

  # --- wire format: OpenAI v1 shape ---
  # v1 = model in the body, NO {model} in the path, and NO api-version query param.
  chat-path: "/openai/v1/chat/completions"
  api-version: ""                        # blank -> not appended to the URL (v1 has none)
  auth-header: "api-key"                 # key-auth header name
  auth-scheme: ""                        # "" -> header value is the raw key (no "Bearer " prefix)

  # --- reasoning-model params (gpt-5-mini) ---
  reasoning-effort: "low"                # how hard the model thinks; "" to omit
  max-completion-tokens: 4000            # reply cap (reasoning models use this, NOT max_tokens)

  iq:
    enabled: false                       # <-- flip to true once IQ values below are real
    endpoint: "https://CONFIRM-ON-MICROSOFT-LEARN"   # Foundry IQ retrieval endpoint
    index: "CONFIRM-IQ-INDEX-OR-KNOWLEDGE-SOURCE-NAME"
    retrieve-path: "/retrieval/indexes/{index}/retrieve"  # VERIFY ON LEARN
    api-version: "CONFIRM-IQ-API-VERSION"
    api-key: ${FOUNDRY_IQ_API_KEY:}      # from env var; if blank, code reuses foundry.api-key
    top-k: 4                             # how many cited snippets to retrieve

# Reasoning-loop guardrails.
agent:
  max-iterations: 6                      # hard cap on model turns (Phase 2 safety/cost guard)
  min-confidence-to-propose: 0.6         # below this the agent escalates (full logic in Phase 3)
